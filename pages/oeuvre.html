<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Valleblond Photography</title>
<meta id="page-description" name="description" content="Découvrez une œuvre de Valleblond Photography.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#F8F7F4">
<link id="page-canonical" rel="canonical" href="https://vlbphotography.netlify.app/pages/oeuvre.html">
<meta property="og:locale" content="fr_FR">
<meta property="og:type" content="product">
<meta id="og-title" property="og:title" content="Valleblond Photography">
<meta id="og-description" property="og:description" content="Découvrez une œuvre de Valleblond Photography.">
<meta id="og-url" property="og:url" content="https://vlbphotography.netlify.app/pages/oeuvre.html">
<meta id="og-image" property="og:image" content="">
<meta name="twitter:card" content="summary_large_image">
<meta id="twitter-title" name="twitter:title" content="Valleblond Photography">
<meta id="twitter-description" name="twitter:description" content="Découvrez une œuvre de Valleblond Photography.">
<meta id="twitter-image" name="twitter:image" content="">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --chalk: #F8F7F4;
    --ink: #1C1C1C;
    --gold: #B8935B;
    --slate-soft: #666;
  }
  body { 
    background: var(--chalk); 
    color: var(--ink); 
    font-family: 'Work Sans', sans-serif; 
    margin:0; 
    padding:0; 
    line-height:1.6;
  }
  .wrap { max-width: 1000px; margin:0 auto; padding:0 32px; }
  img { max-width:100%; height:auto; }
  .display { font-family: 'Fraunces', serif; }
  button {
    background:var(--ink); 
    color:white; 
    padding:16px 32px; 
    border:none; 
    cursor:pointer;
    font-size:1rem;
    letter-spacing: 0.5px;
    margin-top:10px;
    width:100%;
    transition: background 0.3s;
  }
  button:hover { background:#000; }

  .skeleton{
    background:linear-gradient(90deg, #e8e6df 25%, #f2f0ea 37%, #e8e6df 63%);
    background-size:400% 100%;
    animation:shimmer 1.4s ease infinite;
  }
  @keyframes shimmer{ 0%{background-position:100% 0;} 100%{background-position:0 0;} }

  .error-state{
    text-align:center;
    padding:140px 20px;
  }
  .error-state a{ color: var(--ink); }

  @media (max-width: 760px){
    #content-main, #content-loading { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>

<div class="wrap" style="padding-top:40px;">
  <a href="../index.html" style="color:var(--slate-soft); font-size:1.05rem; text-decoration:none;">← Retour à la galerie</a>

  <div id="content-loading" style="display:grid; grid-template-columns:1fr 1fr; gap:60px; margin-top:50px;">
    <div class="skeleton" style="aspect-ratio:4/5;"></div>
    <div>
      <div class="skeleton" style="height:2.8rem; width:80%; margin-bottom:16px;"></div>
      <div class="skeleton" style="height:1.1rem; width:40%; margin-bottom:40px;"></div>
      <div class="skeleton" style="height:110px; width:100%;"></div>
    </div>
  </div>

  <div id="content-error" class="error-state" style="display:none;">
    <h2 class="display">Cette œuvre est introuvable.</h2>
    <p style="color:var(--slate-soft);">Elle n'est peut-être plus disponible, ou le lien est incorrect.</p>
    <p style="margin-top:24px;"><a href="../index.html">← Retourner à la galerie</a></p>
  </div>

  <div id="content-main" style="display:none; grid-template-columns:1fr 1fr; gap:60px; margin-top:50px;">
    <div>
      <img id="photo-img" src="" alt="">
    </div>

    <div>
      <h1 class="display" id="photo-title" style="font-size:2.6rem; line-height:1.1;"></h1>
      <p id="photo-subtitle" style="color:var(--slate-soft); font-size:1.05rem;"></p>

      <div id="print-block" style="margin:36px 0 26px; display:none;">
        <h3 style="font-size:1.3rem;" class="display">Tirage physique</h3>
        <p id="print-format" style="color:var(--slate-soft);"></p>
        <p style="font-size:1.9rem; margin:8px 0 6px;" class="display"><span id="print-price"></span> €</p>
        <div id="paypal-print-button"></div>
      </div>

      <div id="digital-block" style="margin:26px 0; display:none;">
        <h3 style="font-size:1.3rem;" class="display">Fichier numérique HD</h3>
        <p style="color:var(--slate-soft);">JPEG haute résolution — usage personnel</p>
        <p style="font-size:1.9rem; margin:8px 0 6px;" class="display"><span id="digital-price"></span> €</p>
        <div id="paypal-digital-button"></div>
      </div>

      <p id="photo-description" style="color:#555; margin-top: 30px;"></p>
    </div>
  </div>
</div>

<script>
  const supabaseUrl = 'https://wanwxjzfxlxunynnmxia.supabase.co';
  const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhbnd4anpmeGx4dW55bm5teGlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTQxNjUsImV4cCI6MjA5OTUzMDE2NX0.B0yzXCKrRrVUVfUMpa_f2fI-TWXQ7VSeaRGIeDwFHaM';

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

  function showError(){
    document.getElementById('content-loading').style.display = 'none';
    document.getElementById('content-error').style.display = 'block';
  }

  async function loadOeuvre(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if(!id){
      showError();
      return;
    }

    const { data, error } = await supabaseClient
      .from('Artworks')
      .select('*')
      .eq('id', id)
      .eq('is_published', true)
      .single();

    if(error || !data){
      showError();
      return;
    }

    document.getElementById('page-title').textContent = `${data.title} — Valleblond Photography`;
    const artworkUrl = `${window.location.origin}${window.location.pathname}?id=${encodeURIComponent(data.id)}`;
    const artworkDescription = data.description || `Découvrez ${data.title}, une photographie de Valleblond Photography.`;
    document.getElementById('page-description').content = artworkDescription;
    document.getElementById('page-canonical').href = artworkUrl;
    document.getElementById('og-title').content = `${data.title} — Valleblond Photography`;
    document.getElementById('og-description').content = artworkDescription;
    document.getElementById('og-url').content = artworkUrl;
    document.getElementById('og-image').content = data.image_url;
    document.getElementById('twitter-title').content = `${data.title} — Valleblond Photography`;
    document.getElementById('twitter-description').content = artworkDescription;
    document.getElementById('twitter-image').content = data.image_url;
    document.getElementById('photo-img').src = data.image_url;
    document.getElementById('photo-img').alt = data.title;
    document.getElementById('photo-title').textContent = data.title;
    document.getElementById('photo-subtitle').textContent = data.location || '';
    document.getElementById('photo-description').textContent = data.description || '';

    if(data.price_physical){
      document.getElementById('print-block').style.display = 'block';
      document.getElementById('print-format').textContent = data.format || 'Tirage fine art';
      document.getElementById('print-price').textContent = data.price_physical;
      startPrintCheckout(data.id, document.getElementById('paypal-print-button'));
    }

    if(data.price_digital){
      document.getElementById('digital-block').style.display = 'block';
      document.getElementById('digital-price').textContent = data.price_digital;
      startDigitalCheckout(data.id, document.getElementById('paypal-digital-button'));
    }

    document.getElementById('content-loading').style.display = 'none';
    document.getElementById('content-main').style.display = 'grid';
  }

  window.onload = loadOeuvre;
</script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/paypal.js"></script>

</body>
</html>
