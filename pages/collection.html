<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <title>Collection — Valleblond Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--paper:#f8f7f4;--ink:#1c1c1c;--soft:#666;--line:#dedbd3}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Work Sans,sans-serif}.wrap{max-width:1280px;margin:auto;padding:40px clamp(20px,5vw,76px) 100px}.back{color:var(--soft);text-decoration:none}.eyebrow{font-size:.75rem;letter-spacing:.14em;margin:48px 0 12px}.display{font-family:Fraunces,serif;font-weight:400}h1{font-size:clamp(3rem,7vw,6rem);line-height:1;margin:0}.intro{color:var(--soft);font-size:1.1rem;line-height:1.7;max-width:45rem;margin:26px 0 48px}.carousel{position:relative;background:#e8e6df;overflow:hidden}.carousel img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover}.carousel button{position:absolute;top:50%;transform:translateY(-50%);border:0;background:rgba(248,247,244,.92);color:var(--ink);font:1.5rem Work Sans;padding:13px 18px;cursor:pointer}.previous{left:15px}.next{right:15px}.counter{background:rgba(28,28,28,.8);color:#fff;position:absolute;bottom:16px;right:16px;padding:7px 10px;font-size:.8rem}.pack{border-top:1px solid var(--ink);margin-top:56px;padding-top:24px;max-width:38rem}.price{font:2.5rem Fraunces,serif;margin:12px 0}.consent{display:flex;gap:10px;color:var(--soft);font-size:.9rem;line-height:1.5;margin:20px 0}.works{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:32px;margin-top:70px}.work{color:inherit;text-decoration:none}.work img{display:block;width:100%;aspect-ratio:3/4;object-fit:cover;background:#e8e6df}.work h2{font:1.45rem Fraunces,serif;margin:15px 0 5px}.work p{color:var(--soft);margin:0}.error{padding:120px 0;text-align:center}@media(max-width:760px){.works{grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}.carousel img{aspect-ratio:4/5}}@media(max-width:430px){.works{grid-template-columns:1fr}}
  </style>
</head>
<body><main class="wrap"><a class="back" href="../index.html" data-i18n="returnGallery">← Retour à la galerie</a><div id="content"><p class="eyebrow" data-i18n="collection">COLLECTION</p><h1 class="display" data-i18n="loading">Chargement…</h1></div></main>
<script src="../assets/js/config.js"></script><script src="../assets/js/i18n.js"></script><script src="../assets/js/paypal.js"></script>
<script>
  const db=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_PUBLISHABLE_KEY);let collection,items=[],index=0;
  function show(){const item=items[index],{localized}=window.ValleblondI18n;document.getElementById('collection-image').src=item.image_url;document.getElementById('collection-image').alt=localized(item,'title');document.getElementById('counter').textContent=`${index+1} / ${items.length}`}
  async function load(){const {t,localized}=window.ValleblondI18n;const id=new URLSearchParams(location.search).get('id');if(!id)return error();const {data,error:e}=await db.from('collections').select('id,title,title_en,title_es,description,description_en,description_es,price_digital_pack,collection_items(position, Artworks(id,title,title_en,title_es,location,location_en,location_es,image_url,price_digital))').eq('id',id).eq('is_published',true).single();if(e||!data)return error();collection=data;items=(data.collection_items||[]).sort((a,b)=>a.position-b.position).map(x=>x.Artworks).filter(Boolean);if(items.length<2)return error();const collectionTitle=localized(data,'title');document.title=`${collectionTitle} — Valleblond Photography`;const root=document.getElementById('content');root.innerHTML=`<p class="eyebrow">${t('collection')}</p><h1 class="display" id="title"></h1><p class="intro" id="description"></p><section class="carousel"><img id="collection-image" src="" alt=""><button class="previous" type="button" aria-label="${t('previousPhoto')}">←</button><button class="next" type="button" aria-label="${t('nextPhoto')}">→</button><span class="counter" id="counter"></span></section>${data.price_digital_pack?`<section class="pack"><p class="eyebrow">${t('digitalPack')}</p><h2 class="display">${t('completeCollection')}</h2><p class="price">${Number(data.price_digital_pack).toFixed(2)} €</p><label class="consent"><input id="consent" type="checkbox"><span>${t('digitalConsent')}</span></label><div id="paypal-pack"></div></section>`:''}<section class="works" id="works"></section>`;document.getElementById('title').textContent=collectionTitle;document.getElementById('description').textContent=localized(data,'description');show();root.querySelector('.previous').onclick=()=>{index=(index-1+items.length)%items.length;show()};root.querySelector('.next').onclick=()=>{index=(index+1)%items.length;show()};const works=document.getElementById('works');items.forEach(item=>{const a=document.createElement('a');a.className='work';a.href=`oeuvre.html?id=${encodeURIComponent(item.id)}`;const title=localized(item,'title'),location=localized(item,'location');a.innerHTML=`<img src="${item.image_url}" alt="${title}" loading="lazy"><h2>${title}</h2><p>${location||''}</p>`;works.append(a)});const consent=document.getElementById('consent');if(consent){let ready=false;consent.onchange=()=>{if(!consent.checked){document.getElementById('paypal-pack').textContent='';ready=false}else if(!ready){ready=true;startCollectionDigitalCheckout(data.id,document.getElementById('paypal-pack'),()=>consent.checked)}}}}
  function error(){const {t}=window.ValleblondI18n;document.getElementById('content').innerHTML=`<section class="error"><h1 class="display">${t('collectionNotFound')}</h1><p>${t('collectionUnavailable')}</p></section>`}window.addEventListener('load',load);
</script></body></html>
